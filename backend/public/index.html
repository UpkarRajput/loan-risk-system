<!DOCTYPE html>
<html>
<head>
    <title>Professional Loan Risk System</title>
    <style>
        body { font-family: Arial; background: #f4f6f9; text-align: center; }
        .card { width: 400px; margin: 50px auto; padding: 20px; background: white; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 10px; margin: 8px 0; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; }
        .result { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Loan Eligibility Checker</h2>

    <input type="text" id="full_name" placeholder="Full Name">
    <input type="number" id="age" placeholder="Age">
    <input type="number" id="monthly_income" placeholder="Monthly Income">
    
    <select id="employment_type">
        <option value="Salaried">Salaried</option>
        <option value="Business">Business</option>
        <option value="Self-Employed">Self-Employed</option>
        <option value="Student">Student</option>
    </select>

    <input type="number" id="credit_score" placeholder="Credit Score">
    <input type="number" id="existing_loans" placeholder="Existing Loans">
    <input type="number" id="loan_amount" placeholder="Loan Amount">
    <input type="number" id="tenure_months" placeholder="Tenure (Months)">

    <button onclick="applyLoan()">Check Eligibility</button>

    <div class="result" id="result"></div>
</div>

<script>
async function applyLoan() {
    const data = {
        full_name: document.getElementById('full_name').value,
        age: parseInt(document.getElementById('age').value),
        monthly_income: parseFloat(document.getElementById('monthly_income').value),
        employment_type: document.getElementById('employment_type').value,
        credit_score: parseInt(document.getElementById('credit_score').value),
        existing_loans: parseInt(document.getElementById('existing_loans').value),
        loan_amount: parseFloat(document.getElementById('loan_amount').value),
        tenure_months: parseInt(document.getElementById('tenure_months').value)
    };

    const response = await fetch('/apply-loan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    });

    const result = await response.json();

    document.getElementById('result').innerHTML =
        `Status: ${result.status} <br> Risk Score: ${result.risk_score}`;
}
</script>

</body>
</html>
